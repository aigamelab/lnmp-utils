# lnmp-utils multi-distro test — docker compose variant
#
# Mount rules (see shared/docs/Git规范.md):
#   - Source mounts are READ-ONLY (:ro) — install never writes to /opt/lnmp-utils*
#   - Writable temp data mounts to system /tmp/ only
#
# Usage: docker compose up --abort-on-container-exit

services:
  rockylinux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rockylinux
    image: lnmp-test-rockylinux:latest
    privileged: true
    volumes:
      - ..:/opt/lnmp-utils:ro
      - ../../lnmp-utils-build:/opt/lnmp-utils-build:ro
      - /tmp/aigm-test-pkg:/tmp/aigm-lnmp-utils
    command: -b -c php mariadb openresty redis memcache

  centos:
    build:
      context: ..
      dockerfile: docker/Dockerfile.centos
    image: lnmp-test-centos:latest
    privileged: true
    volumes:
      - ..:/opt/lnmp-utils:ro
      - ../../lnmp-utils-build:/opt/lnmp-utils-build:ro
      - /tmp/aigm-test-pkg:/tmp/aigm-lnmp-utils
    command: -b -c php mariadb openresty redis memcache

  ubuntu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ubuntu
    image: lnmp-test-ubuntu:latest
    privileged: true
    volumes:
      - ..:/opt/lnmp-utils:ro
      - ../../lnmp-utils-build:/opt/lnmp-utils-build:ro
      - /tmp/aigm-test-pkg:/tmp/aigm-lnmp-utils
    command: -b -c php mariadb openresty redis memcache

  debian:
    build:
      context: ..
      dockerfile: docker/Dockerfile.debian
    image: lnmp-test-debian:latest
    privileged: true
    volumes:
      - ..:/opt/lnmp-utils:ro
      - ../../lnmp-utils-build:/opt/lnmp-utils-build:ro
      - /tmp/aigm-test-pkg:/tmp/aigm-lnmp-utils
    command: -b -c php mariadb openresty redis memcache
