# lnmp-utils multi-distro CI test — docker compose variant
#
# Tests install.sh by building the full image for each distro.
# install.sh runs at Docker build time — build success = test pass.
#
# Usage: docker compose up --abort-on-container-exit

services:
  rockylinux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rockylinux
      target: full
    image: aigameism/lnmp-utils:rockylinux

  centos:
    build:
      context: ..
      dockerfile: docker/Dockerfile.centos
      target: full
    image: aigameism/lnmp-utils:centos

  ubuntu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ubuntu
      target: full
    image: aigameism/lnmp-utils:ubuntu

  debian:
    build:
      context: ..
      dockerfile: docker/Dockerfile.debian
      target: full
    image: aigameism/lnmp-utils:debian
